<style>

<script>

const ls=Q('ls'),lb=Q('lb'),lt=Q('lt'),sh_=Q('sh'),sadd=Q('sadd'),bw_=Q('bw'),bs_=Q('bs'),bc_=Q('bc'),ci=Q('ci'),ch_=Q('ch'),bo_=Q('bo'),sl_=Q('sl'),li_=Q('li'),pl_=Q('pl'),pr_=Q('pr'),lpi=Q('lpi'),rpi=Q('rpi'),ts_=Q('ts'),pi_=Q('pi'),tpn_=Q('tpn'),nl_=Q('nl'),nr_=Q('nr'),fi_=Q('fi'),snew_=Q('snew'),simp_=Q('simp'),sfi_=Q('sfi'),bsv_=Q('bsv'),bex_=Q('bex'),bcl_=Q('bcl'),bpic_=Q('bpic');

async function showShelf(){var db=await openDB();var tx=db.transaction('books','readonly');var req=tx.objectStore('books').getAll();var books=await new Promise(function(r){req.onsuccess=function(){r(req.result)}});books.sort(function(a,b){return b.tm-a.tm});sh_.querySelectorAll('.scard').forEach(function(c){c.remove()});for(var i=0;i<books.length;i++){(function(bk){var c=document.createElement('div');c.className='scard';var img=bk.imgs&&bk.imgs.length>0?'<img src="'+bk.imgs[0].d+'">':'<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:24px">?</div>';c.innerHTML=img+'<div class="scn">'+bk.name+'</div>'+'<div class="scx" title="delete">x</div>';c.querySelector('.scx').addEventListener('click',function(e){e.stopPropagation();delBook(bk.name)});c.addEventListener('click',function(){openBook(bk)});sh_.insertBefore(c,sadd)})(books[i])}ls.classList.add('hidden');setTimeout(function(){if(ls.parentNode)ls.remove()},300)}
